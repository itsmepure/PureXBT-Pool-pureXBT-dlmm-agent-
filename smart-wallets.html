<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PureXBT — Smart Wallets</title>
<link rel="icon" type="image/svg+xml" href="logo.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:'JetBrains Mono','Fira Code','Cascadia Code',ui-monospace,monospace;
  --bg:#0A0A0A;--surface:#161616;--surface-2:#1C1C1C;--border:#333;
  --text:#E8E8E8;--text-dim:#888;--accent:#ff4fb8;--accent-glow:rgba(255,79,184,0.1);
  --green:#4ECB71;--green-fill:rgba(78,203,113,0.1);--red:#E85D5D;--red-fill:rgba(232,93,93,0.1);
  --orange:#F0A050;--cyan:#5CB8FF;
  --radius:4px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}
.container{max-width:900px;margin:0 auto;padding:20px 16px 40px}
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:18px;flex-wrap:wrap;gap:12px}
.header-left h1{font-size:18px;font-weight:700;color:#fff}
.header-left .sub{font-size:10px;color:var(--text-dim);margin-top:3px}
.header-right{display:flex;gap:8px;align-items:center}
.nav-btn{padding:6px 12px;border:1px solid var(--border);border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;background:var(--surface-2);color:var(--text);font-family:var(--font);text-transform:uppercase;letter-spacing:0.5px;text-decoration:none}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-btn.active{background:rgba(255,79,184,0.1);border-color:var(--accent);color:var(--accent)}
.nav-btn.refresh{background:transparent;border-color:var(--accent);color:var(--accent)}
.auth-status{font-size:10px;color:var(--green);font-weight:600;white-space:nowrap}
.auth-pass{font-family:var(--font);font-size:11px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;width:110px}
.auth-pass:focus{border-color:var(--accent)}
.auth-btn.logout{background:var(--red-fill);border-color:var(--red);color:var(--red)}

.add-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.add-form h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--accent);margin-bottom:12px}
.form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
.form-field input,.form-field select{font-family:var(--font);font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;min-width:140px}
.form-field input:focus,.form-field select:focus{border-color:var(--accent)}
.form-field input::placeholder{color:var(--text-dim);opacity:0.5}
.add-btn{padding:7px 18px;border:none;border-radius:var(--radius);font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;background:var(--accent);color:#fff;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
.add-btn:hover{opacity:0.9}

.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.section-title{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--accent);background:rgba(255,79,184,0.04);border-bottom:1px solid var(--border)}
.section-title .count{font-size:9px;color:var(--text-dim);font-weight:400;margin-left:6px}
.section-body{padding:10px 14px}

.wallet-table{width:100%;border-collapse:collapse;font-size:11px}
.wallet-table th{text-align:left;padding:6px 8px;color:var(--text-dim);font-size:9px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);font-weight:700;white-space:nowrap}
.wallet-table td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.04)}
.wallet-table tr:hover{background:rgba(255,255,255,0.02)}
.wallet-table .addr{font-size:10px;color:var(--text-dim);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.category-tag{font-size:8px;padding:2px 6px;border-radius:3px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px}
.cat-alpha{background:var(--green-fill);color:var(--green);border:1px solid rgba(78,203,113,0.2)}
.cat-whale{background:var(--accent-glow);color:var(--accent);border:1px solid rgba(255,79,184,0.2)}
.cat-kol{background:rgba(240,160,80,0.1);color:var(--orange);border:1px solid rgba(240,160,80,0.2)}
.cat-random{background:rgba(255,255,255,0.06);color:var(--text-dim);border:1px solid rgba(255,255,255,0.1)}
.type-lp{background:rgba(92,184,255,0.1);color:var(--cyan);border:1px solid rgba(92,184,255,0.2)}
.type-holder{background:rgba(255,255,255,0.05);color:var(--text-dim);border:1px solid rgba(255,255,255,0.08)}
.del-btn{padding:3px 8px;border:1px solid var(--red);border-radius:3px;font-size:9px;cursor:pointer;background:transparent;color:var(--red);font-family:var(--font);font-weight:600}
.del-btn:hover{background:var(--red-fill)}
.edit-btn{padding:3px 8px;border:1px solid var(--cyan);border-radius:3px;font-size:9px;cursor:pointer;background:transparent;color:var(--cyan);font-family:var(--font);font-weight:600;margin-right:4px}
.edit-btn:hover{background:rgba(92,184,255,0.1)}
.inline-input{font-family:var(--font);font-size:11px;padding:4px 6px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;max-width:160px}
.inline-input:focus{border-color:var(--accent)}
.inline-select{font-family:var(--font);font-size:11px;padding:4px 6px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none}
.inline-select:focus{border-color:var(--accent)}
.save-btn{padding:3px 10px;border:none;border-radius:var(--radius);font-size:9px;font-weight:700;cursor:pointer;background:var(--green);color:#fff;font-family:var(--font)}
.save-btn:hover{opacity:0.9}
.cancel-btn{padding:3px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:9px;cursor:pointer;background:transparent;color:var(--text-dim);font-family:var(--font);margin-left:4px}
.cancel-btn:hover{color:var(--text)}
.search-bar{width:100%;font-family:var(--font);font-size:11px;padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;margin-bottom:10px}
.search-bar:focus{border-color:var(--accent)}
.search-bar::placeholder{color:var(--text-dim);opacity:0.5}
.edit-row td{padding:7px 8px;background:rgba(255,79,184,0.03)}

.empty-state{text-align:center;padding:32px 20px;color:var(--text-dim);font-size:12px}
.empty-state strong{color:var(--accent);display:block;margin-bottom:4px}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:var(--radius);font-size:11px;font-weight:600;z-index:9999;animation:slideIn 0.25s ease}
.toast-ok{background:var(--green-fill);color:var(--green);border:1px solid rgba(78,203,113,0.3)}
.toast-err{background:var(--red-fill);color:var(--red);border:1px solid rgba(232,93,93,0.3)}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:600px){
  .form-row{flex-direction:column}.form-field input,.form-field select{min-width:100%}
}
</style>
</head>
<body>
<div class="container">
<header class="header">
  <div class="header-left">
    <h1>Smart Wallets</h1>
    <div class="sub">Tracked wallets &bull; confidence boost for screened pools</div>
  </div>
  <div class="header-right" id="header-right">
    <span id="auth-status" class="auth-status" style="display:none"></span>
    <input type="password" id="auth-pass" class="auth-pass" style="display:none" placeholder="Password..." onkeydown="if(event.key==='Enter')login()">
    <button id="auth-btn" class="nav-btn auth-btn" onclick="login()">Login</button>
    <a href="/" class="nav-btn">Dashboard</a>
    <a href="/learning" class="nav-btn">Learning</a>
    <button class="nav-btn refresh" onclick="refresh()">Refresh</button>
  </div>
</header>

<form class="add-form" onsubmit="addWallet(event)">
  <h3>Tambah Smart Wallet</h3>
  <div class="form-row">
    <div class="form-field">
      <label>Name</label>
      <input type="text" id="sw-name" placeholder="Contoh: Whalesniper" required maxlength="40">
    </div>
    <div class="form-field">
      <label>Address</label>
      <input type="text" id="sw-address" placeholder="Solana address..." required maxlength="48" pattern="[1-9A-HJ-NP-Za-km-z]{32,44}">
    </div>
    <div class="form-field">
      <label>Category</label>
      <select id="sw-category">
        <option value="alpha">Alpha</option>
        <option value="whale">Whale</option>
        <option value="kol">KOL</option>
        <option value="random">Random</option>
      </select>
    </div>
    <div class="form-field">
      <label>Type</label>
      <select id="sw-type">
        <option value="lp">LP (cek posisi)</option>
        <option value="holder">Holder (tidak cek)</option>
      </select>
    </div>
    <button type="submit" class="add-btn">Tambah</button>
  </div>
</form>

<div class="section">
  <div class="section-title">Wallet List <span class="count" id="wallet-count">-</span></div>
  <div class="section-body">
    <input type="text" class="search-bar" id="sw-search" placeholder="Cari wallet..." oninput="filterWallets()">
    <div id="wallet-list-body">
      <div class="empty-state"><strong>No wallets tracked</strong>Tambah wallet DLMM player di atas untuk confidence boost</div>
    </div>
  </div>
</div>


<div class="section" id="tracked-pools-section">
  <div class="section-title">Tracked Pools <span class="count" id="tracked-count">-</span></div>
  <div class="section-body" id="tracked-pools-body">
    <div class="empty-state"><strong>Loading...</strong>Fetching tracked wallet positions</div>
  </div>
</div>

</div>

<script>
const API = window.location.origin;
const PW_KEY = '_sw_auth';

function fmtAddr(addr){return addr?addr.slice(0,6)+'...'+addr.slice(-4):'?'}

function getAuthHeaders(){
  const pw = sessionStorage.getItem(PW_KEY);
  if(!pw)return{};
  return {Authorization:'Basic '+btoa('admin:'+pw)};
}

function isLoggedIn(){return !!sessionStorage.getItem(PW_KEY)}

function updateAuthUI(){
  const status = document.getElementById('auth-status');
  const pass = document.getElementById('auth-pass');
  const btn = document.getElementById('auth-btn');
  if(isLoggedIn()){
    status.style.display='inline';
    status.textContent='OWNER';
    pass.style.display='none';
    btn.textContent='Logout';
    btn.classList.add('logout');
    btn.onclick=logout;
  }else{
    status.style.display='none';
    pass.style.display='inline-block';
    btn.textContent='Login';
    btn.classList.remove('logout');
    btn.onclick=login;
    pass.focus();
  }
}

function login(){
  const pass = document.getElementById('auth-pass');
  const pw = pass.value.trim();
  if(!pw){toast('Password diperlukan','err');return}
  sessionStorage.setItem(PW_KEY,pw);
  pass.value='';
  updateAuthUI();
  toast('Logged in','ok');
  refresh();
}

function logout(){
  sessionStorage.removeItem(PW_KEY);
  updateAuthUI();
  refresh();
}

let _allWallets = [];
let _editingAddress = null;

async function refresh(){
  const body = document.getElementById('wallet-list-body');
  const count = document.getElementById('wallet-count');
  try{
    const r = await fetch(API+'/api/smart-wallets',{headers:getAuthHeaders()});
    const d = await r.json();
    if(!d.ok){
      if(r.status===401||r.status===403){
        body.innerHTML='<div class="empty-state"><strong>Login dulu</strong>Masukkan password di atas untuk akses smart wallets</div>';
        count.textContent='?';
        fetchTrackedPools();
        return;
      }
      body.innerHTML='<div class="empty-state"><strong>Error</strong>'+esc(d.error)+'</div>';return;
    }
    _allWallets = d.wallets||[];
    _editingAddress = null;
    count.textContent=_allWallets.length;
    renderWallets(_allWallets);
    fetchTrackedPools();
  }catch(e){
    body.innerHTML='<div class="empty-state"><strong>Error</strong>'+esc(String(e))+'</div>';
  }
}

function filterWallets(){
  const q = (document.getElementById('sw-search').value||'').trim().toLowerCase();
  if(!q){renderWallets(_allWallets);return}
  const filtered = _allWallets.filter(w =>
    (w.name||'').toLowerCase().includes(q) ||
    (w.address||'').toLowerCase().includes(q) ||
    (w.category||'').toLowerCase().includes(q)
  );
  renderWallets(filtered);
}

function renderWallets(wallets){
  const body = document.getElementById('wallet-list-body');
  if(!wallets.length){
    body.innerHTML='<div class="empty-state"><strong>'+(_allWallets.length?'No results':'No wallets tracked')+'</strong>'+
      (_allWallets.length?'Coba keyword lain atau <a href="#" onclick="clearSearch();return false" style="color:var(--accent)">reset filter</a>':'Tambah wallet DLMM player di atas untuk confidence boost')+'</div>';
    return;
  }
  let html='<table class="wallet-table"><thead><tr><th>#</th><th>Name</th><th>Address</th><th>Category</th><th>Type</th><th>Added</th><th></th></tr></thead><tbody>';
  wallets.forEach((w,i)=>{
    const isEditing = _editingAddress === w.address;
    const added = w.addedAt?w.addedAt.slice(0,10):'?';
    if(isEditing){
      html+='<tr class="edit-row" id="edit-'+w.address+'">'+
        '<td>'+(i+1)+'</td>'+
        '<td><input class="inline-input" id="edit-name-'+w.address+'" value="'+escAttr(w.name)+'" maxlength="40"></td>'+
        '<td class="addr" title="'+escAttr(w.address)+'">'+fmtAddr(w.address)+'</td>'+
        '<td><select class="inline-select" id="edit-cat-'+w.address+'">'+
          '<option value="alpha"'+(w.category==='alpha'?' selected':'')+'>Alpha</option>'+
          '<option value="whale"'+(w.category==='whale'?' selected':'')+'>Whale</option>'+
          '<option value="kol"'+(w.category==='kol'?' selected':'')+'>KOL</option>'+
          '<option value="random"'+(w.category==='random'?' selected':'')+'>Random</option>'+
        '</select></td>'+
        '<td><span class="category-tag '+(w.type==='holder'?'type-holder':'type-lp')+'">'+(w.type||'lp')+'</span></td>'+
        '<td style="font-size:10px;color:var(--text-dim)">'+added+'</td>'+
        '<td><button class="save-btn" onclick="saveWallet(\''+escAttr(w.address)+'\')">Save</button>'+
        '<button class="cancel-btn" onclick="cancelEdit(\''+escAttr(w.address)+'\')">x</button></td></tr>';
    }else{
      html+='<tr id="row-'+w.address+'">'+
        '<td>'+(i+1)+'</td>'+
        '<td style="font-weight:600">'+esc(w.name)+'</td>'+
        '<td class="addr" title="'+esc(w.address)+'">'+fmtAddr(w.address)+'</td>'+
        '<td><span class="category-tag cat-'+(w.category||'alpha')+'">'+(w.category||'alpha')+'</span></td>'+
        '<td><span class="category-tag '+(w.type==='holder'?'type-holder':'type-lp')+'">'+(w.type||'lp')+'</span></td>'+
        '<td style="font-size:10px;color:var(--text-dim)">'+added+'</td>'+
        '<td><button class="edit-btn" onclick="editWallet(\''+escAttr(w.address)+'\')">E</button>'+
        '<button class="del-btn" onclick="removeWallet(\''+escAttr(w.address)+'\')">x</button></td></tr>';
    }
  });
  html+='</tbody></table>';
  body.innerHTML=html;
}

function clearSearch(){document.getElementById('sw-search').value='';renderWallets(_allWallets)}

function editWallet(address){
  _editingAddress = address;
  renderWallets(_allWallets);
}

function cancelEdit(address){
  _editingAddress = null;
  renderWallets(_allWallets);
}

async function saveWallet(address){
  const name = document.getElementById('edit-name-'+address).value.trim();
  const category = document.getElementById('edit-cat-'+address).value;
  if(!name){toast('Name tidak boleh kosong','err');return}
  try{
    const r = await fetch(API+'/api/smart-wallets',{method:'PATCH',headers:{...getAuthHeaders(),'Content-Type':'application/json'},body:JSON.stringify({address,name,category})});
    const d = await r.json();
    if(d.ok){
      toast('Wallet '+esc(name)+' diupdate','ok');
      refresh();
    }else{toast(d.error||'Gagal','err')}
  }catch(e){toast(String(e),'err')}
}

async function fetchTrackedPools(){
  const body = document.getElementById('tracked-pools-body');
  const count = document.getElementById('tracked-count');
  if(!isLoggedIn()){body.innerHTML='<div class="empty-state"><strong>Login dulu</strong>Untuk melihat tracked pools</div>';count.textContent='?';return}
  try{
    const r = await fetch(API+'/api/smart-wallets/pools',{headers:getAuthHeaders()});
    const d = await r.json();
    if(!d.ok){body.innerHTML='<div class="empty-state"><strong>Error</strong>'+esc(d.error)+'</div>';count.textContent='-';return}
    const pools = d.pools||[];
    count.textContent=pools.length;
    if(!pools.length){body.innerHTML='<div class="empty-state"><strong>No positions found</strong>Tracked LP wallets have no open positions saat ini</div>';return}
    let html='<table class="wallet-table"><thead><tr><th>#</th><th>Pool</th><th>Address</th><th>Tracked By</th></tr></thead><tbody>';
    pools.forEach((p,i)=>{
      const trackedNames = (p.tracked_by||[]).map((w)=>'<span class="category-tag cat-'+(w.category||'alpha')+'" title="'+esc(w.address)+'">'+esc(w.name)+'</span>').join(' ');
      html+='<tr>'+
        '<td>'+(i+1)+'</td>'+
        '<td style="font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(p.pool_name||'')+'">'+esc(p.pool_name||p.pool_address.slice(0,16)+'...')+'</td>'+
        '<td class="addr" title="'+esc(p.pool_address)+'">'+fmtAddr(p.pool_address)+'</td>'+
        '<td>'+trackedNames+'</td>'+
        '</tr>';
    });
    html+='</tbody></table>';
    body.innerHTML=html;
  }catch(e){body.innerHTML='<div class="empty-state"><strong>Error</strong>'+esc(String(e))+'</div>';count.textContent='-';}
}

async function addWallet(e){
  e.preventDefault();
  const name = document.getElementById('sw-name').value.trim();
  const address = document.getElementById('sw-address').value.trim();
  const category = document.getElementById('sw-category').value;
  const type = document.getElementById('sw-type').value;
  if(!name||!address){toast('Name dan address diperlukan','err');return}
  try{
    const r = await fetch(API+'/api/smart-wallets',{method:'POST',headers:{...getAuthHeaders(),'Content-Type':'application/json'},body:JSON.stringify({name,address,category,type})});
    const d = await r.json();
    if(d.ok){
      toast('Wallet '+esc(name)+' ditambahkan','ok');
      document.getElementById('sw-name').value='';
      document.getElementById('sw-address').value='';
      refresh();
    }else{toast(d.error||'Gagal','err')}
  }catch(e){toast(String(e),'err')}
}

async function removeWallet(address){
  try{
    const r = await fetch(API+'/api/smart-wallets?address='+encodeURIComponent(address),{method:'DELETE',headers:getAuthHeaders()});
    const d = await r.json();
    if(d.ok){toast('Dihapus: '+esc(d.removed||address),'ok');refresh()}
    else toast(d.error||'Gagal','err');
  }catch(e){toast(String(e),'err')}
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escAttr(s){return esc(s).replace(/"/g,'&quot;')}

function toast(msg,type){
  const el = document.createElement('div');
  el.className='toast toast-'+(type==='err'?'err':'ok');
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

updateAuthUI();
refresh();
</script>
</body>
</html>
